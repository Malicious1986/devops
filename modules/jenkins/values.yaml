controller:
  admin:
    username: admin
    password: admin123

  serviceType: LoadBalancer
  servicePort: 8080
  targetPort: 8080

  resources:
    limits:
      cpu: "500m"
      memory: "768Mi"
    requests:
      cpu: "200m"
      memory: "512Mi"

  initContainerResources:
    limits:
      cpu: "500m"
      memory: "512Mi"
    requests:
      cpu: "100m"
      memory: "256Mi"

  # Give the plugin manager JVM enough heap to parse the plugin catalog
  initContainerEnv:
    - name: JAVA_OPTS
      value: "-Xmx384m"

  installLatestPlugins: false
  installLatestSpecifiedPlugins: false
  initializeOnce: true

  installPlugins:
    - job-dsl:3654.vdf58f53e2d15
    - kubernetes:4423.vb_59f230b_ce53
    - workflow-aggregator:608.v67378e9d3db_1
    - git:5.10.1
    - credentials-binding:725.ve52b_2328a_fde
    - configuration-as-code:2095.vef6db_3a_b_5b_9c

  serviceAccount:
    name: jenkins-sa
    create: false

  JCasC:
    configScripts:
      security: |
        security:
          scriptApproval:
            approvedSignatures:
              - "method groovy.lang.GroovyObject invokeMethod java.lang.String java.lang.Object"
        jobs:
          - script: >
              job('seed-job') {
                description('Job to generate pipeline for Django project')
                scm {
                  git {
                    remote {
                      url('https://github.com/Malicious1986/devops.git')
                      credentials('github-token')
                    }
                    branches('*/main')
                  }
                }
                steps {
                  dsl {
                    text('''
                      pipelineJob("goit-django-docker") {
                        definition {
                          cpsScm {
                            scm {
                              git {
                                remote {
                                  url("https://github.com/Malicious1986/devops.git")
                                  credentials("github-token")
                                }
                                branches("*/main")
                              }
                            }
                            scriptPath("django/Jenkinsfile")
                          }
                        }
                      }
                    ''')
                  }
                }
              }
      credentials: |
        credentials:
          system:
            domainCredentials:
              - credentials:
                  - usernamePassword:
                      scope: GLOBAL
                      id: github-token
                      username: Malicious1986
                      password: "REPLACE_WITH_GITHUB_PAT"
                      description: GitHub PAT

persistence:
  enabled: true
  storageClass: gp3
  size: 10Gi

