image:
  repository: your-registry/your-django-image
  tag: latest
  pullPolicy: IfNotPresent

service:
  type: LoadBalancer
  port: 8000

ingress:
  enabled: false

autoscaling:
  enabled: true

  minReplicas: 2
  maxReplicas: 6

  targetCPUUtilizationPercentage: 70

config:
  DEBUG: "1"
  SECRET_KEY: "django-secret-key"

  POSTGRES_DB: "django_db"
  POSTGRES_USER: "django_user"
  POSTGRES_PASSWORD: "django_password"
  POSTGRES_HOST: "db"
  POSTGRES_PORT: "5432"